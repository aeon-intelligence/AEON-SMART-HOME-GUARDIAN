name: "AEON MATRIX Release"

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Create Release Record
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
