name: "AEON MATRIX Security Hardening"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  security-check:
    name: Security Gate
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Security Tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit

      - name: Python Security Scan
        run: |
          bandit -r . -x ./.venv || true

      - name: Dependency Audit
        run: |
          pip-audit || true

      - name: Security Gate Passed
        run: |
          echo "AEON MATRIX SECURITY GATE READY"
